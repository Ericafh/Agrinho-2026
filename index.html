<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌱 Agro Forte</h1>
        <p>Tecnologia e Sustentabilidade no Campo</p>
    </header>

    <main>
        <section class="card">
            <h2>Monitoramento Agrícola</h2>

            <form id="formAgro">
                <input type="number" step="0.1" id="umidade" placeholder="Umidade do solo (%)" required>

                <input type="number" step="0.1" id="temperatura" placeholder="Temperatura (°C)" required>

                <input type="number" step="0.1" id="ph" placeholder="pH do solo" required>

                <select id="sustentabilidade">
                    <option>Baixo impacto ambiental</option>
                    <option>Uso racional de água</option>
                    <option>Energia renovável</option>
                </select>

                <button type="submit">Salvar Dados</button>
            </form>

            <div id="resultado"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
